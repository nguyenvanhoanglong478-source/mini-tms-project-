<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS Mini v2.0 - Hệ thống quản lý vận tải</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #1a1a2e;
            --accent-color: #e94560;
            --card-bg: #16213e;
            --text-main: #ffffff;
            --text-muted: #a0a0b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header / Logo section */
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header h1 span {
            color: var(--accent-color);
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Cards Layout */
        .role-selection {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 20px;
            width: 100%;
            max-width: 800px;
            /* Ẩn ban đầu, chỉ hiện khi đã check xong session */
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .role-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .role-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 32px rgba(233, 69, 96, 0.3);
        }

        .role-card i {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .role-card:hover i {
            transform: scale(1.1);
        }

        .role-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .role-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Loading Screen overlay */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--card-bg);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .role-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #a0a0b5;">Đang kiểm tra phiên đăng nhập...</p>
    </div>

    <div class="header">
        <h1>TMS Mini <span>v2.0</span></h1>
        <p>Hệ thống quản lý vận tải tinh gọn & hiệu quả</p>
    </div>

    <div class="role-selection" id="main-content">
        <a href="driver-login.html" class="role-card">
            <i class="fa-solid fa-truck-fast"></i>
            <h2>Tài xế</h2>
            <p>Đăng nhập để nhận chuyến đi, cập nhật trạng thái và lộ trình giao hàng.</p>
        </a>

        <a href="manager-login.html" class="role-card">
            <i class="fa-solid fa-user-tie"></i>
            <h2>Quản lý</h2>
            <p>Đăng nhập để điều phối phương tiện, theo dõi tài xế và thống kê hiệu suất.</p>
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Cấu hình Firebase - Thay thế bằng config thật của dự án
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elements
        const loadingScreen = document.getElementById('loading-screen');
        const mainContent = document.getElementById('main-content');

        // Hàm hiển thị giao diện khi chưa đăng nhập
        function showLoginOptions() {
            loadingScreen.style.display = 'none';
            mainContent.style.opacity = '1';
        }

        // Kiểm tra session hiện tại
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Giả sử role của user được lưu trong collection "users" với document ID là UID
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);

                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        
                        // Điều hướng dựa trên role
                        if (userData.role === 'driver') {
                            window.location.replace('driver.html');
                        } else if (userData.role === 'manager') {
                            window.location.replace('dashboard.html');
                        } else {
                            // Không xác định được role thì ở lại trang chọn
                            showLoginOptions();
                        }
                    } else {
                        // User có Auth nhưng chưa có dữ liệu trong Firestore
                        showLoginOptions();
                    }
                } catch (error) {
                    console.error("Lỗi khi lấy thông tin quyền người dùng:", error);
                    showLoginOptions();
                }
            } else {
                // Chưa đăng nhập, hiển thị 2 nút chọn role
                showLoginOptions();
            }
        });
    </script>
</body>
</html>
