<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản lý - TMS Mini v2.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #e94560;
            --text-main: #ffffff;
            --text-muted: #a0a0b5;
            --error-color: #ff4d4f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: var(--text-muted); text-decoration: none;
            font-size: 0.9rem; display: flex; align-items: center; gap: 5px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent-color); }

        .header { text-align: center; margin-bottom: 30px; margin-top: 15px; }
        .header i { font-size: 2.5rem; color: var(--accent-color); margin-bottom: 15px; }
        .header h2 { font-weight: 600; font-size: 1.5rem; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
        }
        .input-group input[type="email"], .input-group input[type="password"] {
            width: 100%; padding: 14px 15px 14px 45px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; color: var(--text-main);
            font-size: 1rem; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none; border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
        }
        .input-group input::placeholder { color: var(--text-muted); }

        /* Checkbox Ghi nhớ đăng nhập */
        .remember-group {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 25px; cursor: pointer; user-select: none;
        }
        
        .remember-group input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 16px; height: 16px; cursor: pointer;
        }

        .remember-group label {
            font-size: 0.9rem; color: var(--text-muted); cursor: pointer;
        }

        .btn-submit {
            width: 100%; padding: 14px;
            background-color: var(--accent-color);
            color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: background-color 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-submit:hover { background-color: #d13a53; }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid #fff; border-top-color: transparent;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Toast */
        #toast-container {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 9999;
        }
        .toast {
            background-color: var(--card-bg); border-left: 4px solid var(--error-color);
            color: white; padding: 15px 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(0); }
        .toast i { color: var(--error-color); font-size: 1.2rem; }

        @media (max-width: 480px) {
            .login-container { margin: 20px; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="login-container">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Quay về
        </a>

        <div class="header">
            <i class="fa-solid fa-user-tie"></i>
            <h2>Quản lý Đăng nhập</h2>
        </div>

        <form id="manager-login-form">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email quản trị" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu" required>
            </div>

            <label class="remember-group">
                <input type="checkbox" id="remember-me" checked>
                <span>Ghi nhớ đăng nhập</span>
            </label>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-text">Đăng nhập</span>
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const form = document.getElementById('manager-login-form');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('btn-spinner');
        const btnText = document.getElementById('btn-text');
        const toastContainer = document.getElementById('toast-container');
        const rememberCheckbox = document.getElementById('remember-me');

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <span>${message}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                spinner.style.display = 'block';
                btnText.textContent = 'Đang xử lý...';
            } else {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Đăng nhập';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const isRemember = rememberCheckbox.checked;

            setLoading(true);

            try {
                // Thiết lập phiên đăng nhập dựa vào Checkbox
                const persistenceType = isRemember ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Đăng nhập Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Kiểm tra Role trong Realtime Database
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);

                if (snapshot.exists() && snapshot.val().role === 'manager') {
                    window.location.replace('dashboard.html');
                } else {
                    // Sai role -> Đăng xuất và báo lỗi
                    await signOut(auth);
                    showToast('Tài khoản này không có quyền truy cập Quản lý!');
                    setLoading(false);
                }
            } catch (error) {
                console.error(error);
                let msg = 'Đăng nhập thất bại. Vui lòng thử lại.';
                if (error.code === 'auth/invalid-credential') msg = 'Email hoặc mật khẩu không chính xác.';
                if (error.code === 'auth/too-many-requests') msg = 'Tài khoản bị khóa tạm thời. Thử lại sau.';
                showToast(msg);
                setLoading(false);
            }
        });
    </script>
</body>
</html>
